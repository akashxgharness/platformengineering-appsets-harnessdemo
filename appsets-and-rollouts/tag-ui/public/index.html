<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rollouts Image Tag Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="title">Rollouts Image Tag</div>
        <div class="subtitle" id="subtitle">Connecting…</div>
      </header>

      <section class="card">
        <div class="tile" id="tile" aria-label="Current color"></div>
        <div class="meta">
          <div class="tag" id="tag">—</div>
          <div class="details" id="details">—</div>
        </div>
      </section>

      <section class="footer">
        <div class="hint">
          Streaming from <code>/api/stream</code> (SSE). Updates when the Rollout
          image tag changes.
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
